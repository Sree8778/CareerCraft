<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --card-bg: rgba(255, 255, 255, 0.05);
      --border-color: rgba(255, 255, 255, 0.1);
      --success: #10b981;
    }
    
    body {
      width: 320px;
      margin: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      padding: 16px;
      box-sizing: border-box;
    }

    h1, h2, h3 {
      margin: 0;
      font-weight: 600;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      margin-bottom: 16px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 10px var(--primary);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.5; }
    }

    .logo-text {
      font-size: 16px;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 9999px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 6px var(--success);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      backdrop-filter: blur(10px);
    }

    .card-title {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .profile-name {
      font-size: 16px;
      font-weight: 500;
    }

    .profile-email {
      font-size: 12px;
      color: var(--text-muted);
    }

    .job-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .job-title {
      font-size: 15px;
      font-weight: 500;
    }

    .job-source {
      font-size: 12px;
      color: var(--primary);
    }

    .btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      background: var(--card-bg);
      color: var(--text-muted);
      cursor: not-allowed;
      border: 1px solid var(--border-color);
    }

    .log-box {
      font-family: monospace;
      font-size: 11px;
      max-height: 80px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      padding: 8px;
      border: 1px solid var(--border-color);
      display: none;
    }

    .log-entry {
      margin-bottom: 4px;
    }

    .log-entry.success { color: var(--success); }
    .log-entry.error { color: #f87171; }
    .log-entry.info { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo-container">
      <div class="logo-dot"></div>
      <div class="logo-text">CareerCraft AI</div>
    </div>
    <div class="status-badge">
      <div id="statusDot" class="status-dot"></div>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <div class="card" id="profileCard">
    <div class="card-title">Career Profile</div>
    <div class="profile-info" id="profileInfo">
      <div class="profile-email">Please log in to your CareerCraft portal at localhost:3000 to sync profile data.</div>
    </div>
  </div>

  <div class="card" id="jobCard" style="display: none;">
    <div class="card-title">Active Form Detected</div>
    <div class="job-info">
      <div class="job-title" id="detectedJobTitle">Job Form</div>
      <div class="job-source" id="detectedJobSource">Source</div>
    </div>
  </div>

  <button class="btn" id="autofillBtn" disabled>
    <span>Auto-Fill Application</span>
  </button>

  <div style="margin-top: 12px;">
    <div class="log-box" id="logBox"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
