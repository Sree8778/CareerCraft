<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock Job Application Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .form-container {
      background-color: #ffffff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 500px;
    }
    h2 {
      margin-top: 0;
      color: #374151;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #4b5563;
    }
    input[type="text"], input[type="email"], input[type="tel"], textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      box-sizing: border-box;
    }
    textarea {
      height: 100px;
      resize: vertical;
    }
    button {
      background-color: #3b82f6;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      width: 100%;
    }
    button:hover {
      background-color: #2563eb;
    }
    .success-msg {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background-color: #d1fae5;
      color: #065f46;
      border-radius: 4px;
      border: 1px solid #a7f3d0;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="form-container">
  <h2>Apply for Software Engineer</h2>
  <form id="jobAppForm">
    <div class="form-group">
      <label for="first_name">First Name</label>
      <input type="text" id="first_name" name="first_name" placeholder="John" required>
    </div>

    <div class="form-group">
      <label for="last_name">Last Name</label>
      <input type="text" id="last_name" name="last_name" placeholder="Doe" required>
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" placeholder="123-456-7890" required>
    </div>

    <div class="form-group">
      <label for="linkedin">LinkedIn URL</label>
      <input type="text" id="linkedin" name="linkedin" placeholder="https://linkedin.com/in/username">
    </div>

    <div class="form-group">
      <label for="portfolio">Portfolio Website</label>
      <input type="text" id="portfolio" name="portfolio" placeholder="https://yourwebsite.com">
    </div>

    <div class="form-group">
      <label for="resume">Attach Resume / CV</label>
      <input type="file" id="resume" name="resume" accept=".pdf" required>
    </div>

    <div class="form-group">
      <label for="why_join">Why do you want to join our company?</label>
      <textarea id="why_join" name="why_join" placeholder="Tell us what motivates you..."></textarea>
    </div>

    <div class="form-group">
      <label for="salary_expectations">What is your expected salary?</label>
      <input type="text" id="salary_expectations" name="salary_expectations" placeholder="$100,000">
    </div>

    <button type="submit">Submit Application</button>
  </form>

  <div class="success-msg" id="successMsg">
    <strong>Success!</strong> Your job application has been submitted successfully.
  </div>
</div>

<script>
  document.getElementById('jobAppForm').addEventListener('submit', function(e) {
    e.preventDefault();
    document.getElementById('successMsg').style.display = 'block';
  });
</script>
</body>
</html>
